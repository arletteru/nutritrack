name: nutritrack
description: "Nutritrack — Sistema de nutrición personalizado."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.2.3
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  riverpod_annotation: ^3.0.3

  # ── Freezed runtime ────────────────────────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0       # para fromJson/toJson en models

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4

  # ── Social sign-in ─────────────────────────────────────────────────────────
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6

  # ── Utils ──────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  fl_chart: ^0.70.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^3.0.3

  # ── Freezed codegen ────────────────────────────────────────────────────────
  freezed: ^3.0.0
  json_serializable: ^6.8.0     # genera fromJson/toJson para los models
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"  # tu ícono
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
